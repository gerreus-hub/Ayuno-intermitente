<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Ayuno</title>
    <style>
        :root { --crema: #fdfaf3; --naranja: #ff7e5f; --texto: #4a3f35; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--crema); color: var(--texto); display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; min-height: 100vh; }
        
        .fase-info { text-align: center; margin-top: 20px; }
        .fase-titulo { font-weight: bold; color: #d4a373; font-size: 1.2rem; margin-bottom: 5px; }

        /* CÍRCULO ESTILO KOMPANION */
        .reloj-container { position: relative; width: 300px; height: 300px; margin: 20px 0; display: flex; justify-content: center; align-items: center; }
        svg { transform: rotate(-90deg); width: 100%; height: 100%; }
        circle { fill: none; stroke-width: 10; stroke-linecap: round; }
        .fondo-gris { stroke: #f0ede4; }
        .progreso-color { stroke: var(--naranja); stroke-dasharray: 754; stroke-dashoffset: 754; transition: 1s linear; }

        .tiempo-centro { position: absolute; text-align: center; }
        .reloj-grande { font-size: 3rem; font-weight: bold; margin: 5px 0; }

        /* BOTÓN PRINCIPAL */
        .btn-principal { 
            background: linear-gradient(to right, #ff7e5f, #feb47b); 
            color: white; border: none; padding: 18px 60px; 
            border-radius: 15px; font-size: 1.2rem; font-weight: bold; 
            box-shadow: 0 10px 20px rgba(255, 126, 95, 0.2); cursor: pointer;
            width: 80%; max-width: 300px;
        }

        /* REGISTRO DE AGUA (250ml) */
        .agua-card { background: white; width: 90%; max-width: 380px; padding: 25px; border-radius: 25px; margin-top: 40px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); text-align: center; }
        .agua-controles { display: flex; justify-content: center; align-items: center; gap: 20px; margin-top: 15px; }
        .btn-agua { background: #f0f7ff; color: #3b82f6; border: none; width: 55px; height: 55px; border-radius: 15px; font-size: 1.8rem; cursor: pointer; font-weight: bold; }
        
        /* BOTÓN CÁMARA CALORÍAS */
        .btn-camara { background: white; border: 2px solid #eee; padding: 10px 20px; border-radius: 12px; margin-top: 20px; font-weight: bold; cursor: pointer; color: #666; }
    </style>
</head>
<body>

    <div class="fase-info">
        <div class="fase-titulo" id="fase-nombre">Fase anabólica</div>
        <div style="font-size: 0.9rem; opacity: 0.6;">Comenzó la digestión</div>
    </div>

    <div class="reloj-container">
        <svg viewBox="0 0 280 280">
            <circle class="fondo-gris" cx="140" cy="140" r="120"></circle>
            <circle class="progreso-color" id="aro" cx="140" cy="140" r="120"></circle>
        </svg>
        <div class="tiempo-centro">
            <div style="font-size: 0.8rem; opacity: 0.5;">TIEMPO TRANSCURRIDO</div>
            <div class="reloj-grande" id="reloj">00:00:00</div>
            <div style="font-size: 0.8rem; color: var(--naranja); font-weight: bold;">OBJETIVO: 16h</div>
        </div>
    </div>

    <button class="btn-principal" id="btnAccion" onclick="controlarAyuno()">Iniciar Ayuno</button>
    <button class="btn-camara" onclick="alert('📸 Aquí abriremos la cámara para las calorías')">📷 Registrar Comida</button>

    <div class="agua-card">
        <div style="font-weight: bold; font-size: 1.1rem;">Registro de agua</div>
        <div style="font-size: 2rem; margin: 10px 0; color: #3b82f6; font-weight: bold;"><span id="total-agua">0</span> <small style="font-size: 1rem;">ml</small></div>
        <div class="agua-controles">
            <button class="btn-agua" onclick="sumarAgua(-250)">−</button>
            <div style="text-align: center;">
                <div style="font-size: 0.8rem; opacity: 0.6;">VASO DE</div>
                <div style="font-weight: bold;">250 ml</div>
            </div>
            <button class="btn-agua" onclick="sumarAgua(250)">+</button>
        </div>
    </div>

    <script>
        let activo = false;
        let inicio;
        let cronometro;
        let aguaTotal = 0;

        function controlarAyuno() {
            activo = !activo;
            const btn = document.getElementById('btnAccion');
            if(activo) {
                inicio = Date.now();
                btn.innerText = "Terminar";
                btn.style.background = "#e5e7eb"; btn.style.color = "#4b5563";
                cronometro = setInterval(update, 1000);
            } else {
                clearInterval(cronometro);
                btn.innerText = "Iniciar Ayuno";
                btn.style.background = "linear-gradient(to right, #ff7e5f, #feb47b)"; btn.style.color = "white";
                document.getElementById('aro').style.strokeDashoffset = 754;
                document.getElementById('reloj').innerText = "00:00:00";
            }
        }

        function update() {
            const segs = Math.floor((Date.now() - inicio) / 1000);
            const h = Math.floor(segs / 3600).toString().padStart(2, '0');
            const m = Math.floor((segs % 3600) / 60).toString().padStart(2, '0');
            const s = (segs % 60).toString().padStart(2, '0');
            document.getElementById('reloj').innerText = `${h}:${m}:${s}`;

            // Mueve el aro (meta 16h = 57600 seg)
            const progreso = Math.min(segs / 57600, 1);
            document.getElementById('aro').style.strokeDashoffset = 754 - (754 * progreso);

            // Cambiar Fases
            const fase = document.getElementById('fase-nombre');
            if(segs > 43200) fase.innerText = "Quema de grasa 🔥";
            else if(segs > 14400) fase.innerText = "Fase catabólica ⚙️";
        }

        function sumarAgua(ml) {
            aguaTotal = Math.max(0, aguaTotal + ml);
            document.getElementById('total-agua').innerText = aguaTotal;
        }
    </script>
</body>
</html>
