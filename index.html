    <style>
        :root { --crema: #fdfaf3; --naranja: #ff7e5f; --texto: #4a3f35; --azul: #3b82f6; --verde: #10b981; --rojo: #ef4444; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--crema); color: var(--texto); display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; min-height: 100vh; padding-bottom: calc(60px + env(safe-area-inset-bottom)); viewport-fit: cover; -webkit-user-select: none; -webkit-tap-highlight-color: transparent; }
        .card { background: white; width: 100%; max-width: 400px; padding: 20px; border-radius: 25px; margin-top: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); box-sizing: border-box; }
        button { border: none; border-radius: 15px; font-weight: bold; cursor: pointer; transition: 0.2s; -webkit-appearance: none; }
        .reloj-container { position: relative; width: 270px; height: 270px; margin: 20px auto; display: flex; justify-content: center; align-items: center; }
        svg { transform: rotate(-90deg); width: 100%; height: 100%; }
        circle { fill: none; stroke-width: 12; stroke-linecap: round; }
        .fondo-gris { stroke: #f0ede4; }
        .progreso-color { stroke: var(--naranja); stroke-dasharray: 754; stroke-dashoffset: 754; transition: 1s linear; }
        .reloj-grande { font-size: 3rem; font-weight: bold; position: absolute; text-align: center; line-height: 1; }
        .reloj-grande small { font-size: 0.85rem; display: block; color: var(--verde); margin-top: 5px; letter-spacing: 1px; }
        .btn-main { background: linear-gradient(135deg, #ff7e5f, #feb47b); color: white; padding: 20px; width: 100%; font-size: 1.2rem; box-shadow: 0 8px 20px rgba(255, 126, 95, 0.25); margin-top: 10px; }
        .config-btn { position: absolute; top: calc(25px + env(safe-area-inset-top)); right: 25px; background: none; font-size: 1.6rem; opacity: 0.3; z-index: 100; }
        .stat-item { background: #fdfaf3; padding: 15px; border-radius: 18px; text-align: center; flex: 1; }
        .boost-tag { background: var(--verde); color: white; padding: 6px 14px; border-radius: 25px; font-size: 0.75rem; position: absolute; top: 35px; z-index: 10; }
        .input-time { width: 100%; padding: 12px; border: 1px solid #f0f0f0; border-radius: 12px; font-size: 0.9rem; margin-top: 5px; background: #fafafa; color: var(--texto); -webkit-appearance: none; }
        label { font-size: 0.75rem; font-weight: bold; opacity: 0.5; display: block; margin-top: 12px; text-transform: uppercase; }
        #loading { display: none; color: var(--azul); font-weight: bold; text-align: center; margin: 10px 0; }
    </style>
</head>
<body>

    <button class="config-btn" onclick="configurarClave()">⚙️</button>

    <div style="font-weight: bold; color: var(--naranja); margin-top: calc(30px + env(safe-area-inset-top)); letter-spacing: 1px;">CRONÓMETRO: <span id="tiempo-real">00:00:00</span></div>

    <div class="reloj-container">
        <div class="boost-tag" id="boost-display" style="display:none">🔥 AYUNO ACELERADO</div>
        <svg viewBox="0 0 280 280">
            <circle class="fondo-gris" cx="140" cy="140" r="120"></circle>
            <circle class="progreso-color" id="aro" cx="140" cy="140" r="120"></circle>
        </svg>
        <div class="reloj-grande">
            <span id="reloj-metabolico">00:00</span>
            <small>EFECTIVO</small>
        </div>
    </div>

    <button class="btn-main" id="btnAccion" onclick="controlarAyuno()">Iniciar Ayuno</button>

    <div class="card">
        <b style="font-size: 0.9rem;">⚙️ Ajuste de Horas (Olvidos)</b>
        <div style="display: flex; gap: 12px;">
            <div style="flex: 1;">
                <label>Empecé a las:</label>
                <input type="datetime-local" id="manual-inicio" class="input-time" onchange="ajustarManual()">
            </div>
            <div style="flex: 1;">
                <label>Terminé a las:</label>
                <input type="datetime-local" id="manual-fin" class="input-time" onchange="ajustarManual()">
            </div>
        </div>
    </div>

    <div class="card">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
            <b style="font-size: 0.9rem;">SAMSUNG HEALTH</b>
            <span style="font-size: 0.7rem; color: var(--azul); font-weight: bold;">METABOLISMO 🔥</span>
        </div>
        <div style="display: flex; gap: 12px;">
            <div class="stat-item"><b id="pasos-val" style="font-size: 1.2rem;">0</b><br><small style="opacity:0.5; font-size:0.7rem;">PASOS</small></div>
            <div class="stat-item"><b id="burn-val" style="font-size: 1.2rem; color: var(--rojo);">0</b><br><small style="opacity:0.5; font-size:0.7rem;">KCAL ENTRENAMIENTO</small></div>
        </div>
        <button onclick="document.getElementById('inputSync').click()" style="background: #f0f7ff; color: var(--azul); padding: 15px; margin-top:15px; width:100%; font-size: 0.85rem; border-radius: 15px;">
            🔄 Sincronizar con Captura
        </button>
        <input type="file" id="inputSync" accept="image/*" style="display:none" onchange="sincronizarActividad(event)">
    </div>

    <div class="card">
        <b style="font-size: 0.9rem;">REGISTRAR COMIDA (IA)</b>
        <input type="text" id="textComida" style="width:100%; padding:15px; margin:10px 0; border:1px solid #f0f0f0; border-radius:15px; box-sizing: border-box; background: #fafafa;" placeholder="Ej: Ensalada y salmón">
        <div id="loading">✨ IA Analizando...</div>
        <div style="display: flex; gap: 10px;">
            <button onclick="analizarTexto()" style="flex:1; background: var(--verde); color: white; padding: 15px;">+ Texto</button>
            <button onclick="document.getElementById('inputFoto').click()" style="flex:1; background: var(--azul); color: white; padding: 15px;">📷 Foto</button>
        </div>
        <input type="file" id="inputFoto" accept="image/*" capture="camera" style="display:none" onchange="analizarFoto(event)">
    </div>

    <script>
        let MI_LLAVE = localStorage.getItem('gemini_key') || "";
        let kcalEntreno = 0, activo = false, inicio, fin, cronometro;
        let MODELO_URL = "";

        async function buscarModelo() {
            if(!MI_LLAVE) return;
            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${MI_LLAVE}`);
                const data = await res.json();
                const mod = data.models.find(m => m.name.includes('flash'));
                if(mod) MODELO_URL = `https://generativelanguage.googleapis.com/v1beta/${mod.name}:generateContent?key=${MI_LLAVE}`;
            } catch(e) {}
        }
        buscarModelo();

        function configurarClave() {
            const key = prompt("Pega tu clave API:", MI_LLAVE);
            if (key) {
                localStorage.setItem('gemini_key', key.trim());
                MI_LLAVE = key.trim();
                buscarModelo();
                alert("✅ Configurado.");
            }
        }

        function controlarAyuno() {
            activo = !activo;
            const btn = document.getElementById('btnAccion');
            if(activo) {
                inicio = Date.now(); fin = null;
                btn.innerText = "Terminar Ayuno";
                btn.style.background = "var(--rojo)";
                document.getElementById('manual-inicio').value = toLocalTime(inicio);
                cronometro = setInterval(updateReloj, 1000);
            } else {
                fin = Date.now();
                document.getElementById('manual-fin').value = toLocalTime(fin);
                clearInterval(cronometro);
                btn.innerText = "Iniciar Ayuno";
                btn.style.background = "linear-gradient(135deg, #ff7e5f, #feb47b)";
            }
        }

        function toLocalTime(time) {
            return new Date(time - new Date().getTimezoneOffset()*60000).toISOString().slice(0, 16);
        }

        function ajustarManual() {
            const valInicio = document.getElementById('manual-inicio').value;
            const valFin = document.getElementById('manual-fin').value;
            if(valInicio) inicio = new Date(valInicio).getTime();
            if(valFin) fin = new Date(valFin).getTime(); else fin = null;
            
            if(inicio && !activo && !fin) {
                activo = true;
                cronometro = setInterval(updateReloj, 1000);
                document.getElementById('btnAccion').innerText = "Terminar Ayuno";
                document.getElementById('btnAccion').style.background = "var(--rojo)";
            } else if (fin) {
                activo = false;
                clearInterval(cronometro);
                document.getElementById('btnAccion').innerText = "Iniciar Ayuno";
                document.getElementById('btnAccion').style.background = "linear-gradient(135deg, #ff7e5f, #feb47b)";
            }
            updateReloj();
        }

        function updateReloj() {
            let ahora = fin || Date.now();
            if(!inicio) return;
            const segsReales = Math.floor((ahora - inicio) / 1000);
            const boostSegundos = Math.floor((kcalEntreno / 200) * 1800);
            const segsEfectivos = Math.max(0, segsReales + boostSegundos);

            document.getElementById('tiempo-real').innerText = formatTime(segsReales, true);
            document.getElementById('reloj-metabolico').innerText = formatTime(segsEfectivos, false);

            const bDisplay = document.getElementById('boost-display');
            if(boostSegundos > 0) {
                bDisplay.style.display = "block";
                bDisplay.innerText = `🔥 +${formatBoost(boostSegundos)} ACELERADO`;
            } else { bDisplay.style.display = "none"; }

            document.getElementById('aro').style.strokeDashoffset = 754 - (754 * Math.min(segsEfectivos / 57600, 1));
        }

        function formatTime(s, showSegs) {
            const h = Math.floor(s / 3600).toString().padStart(2, '0');
            const m = Math.floor((s % 3600) / 60).toString().padStart(2, '0');
            const seg = (s % 60).toString().padStart(2, '0');
            return showSegs ? `${h}:${m}:${seg}` : `${h}:${m}`;
        }

        function formatBoost(s) {
            return `${Math.floor(s/3600)}h ${Math.floor((s%3600)/60)}m`;
        }

        async function llamarIA(promptText, img = null, esSync = false) {
            if(!MODELO_URL) return alert("⚙️ Configura tu clave primero");
            document.getElementById('loading').style.display = "block";
            const body = { contents: [{ parts: [{ text: promptText }, ...(img ? [{ inline_data: { mime_type: "image/jpeg", data: img } }] : [])] }] };
            try {
                const res = await fetch(MODELO_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
                const data = await res.json();
                if(!data.candidates) { alert("Error IA: Clave API bloqueada."); return; }
                const resp = data.candidates[0].content.parts[0].text;
                if(esSync) {
                    const valores = resp.match(/\d+/g);
                    if(valores && valores.length >= 2) {
                        document.getElementById('pasos-val').innerText = valores[0];
                        kcalEntreno = parseInt(valores[1]);
                        document.getElementById('burn-val').innerText = kcalEntreno;
                        updateReloj();
                        alert("✅ Datos sincronizados.");
                    }
                } else { alert("Registrado: " + resp); }
            } catch (e) { alert("Error IA"); }
            document.getElementById('loading').style.display = "none";
        }

        function sincronizarActividad(e) {
            const reader = new FileReader();
            reader.onloadend = () => {
                const b64 = reader.result.split(',')[1];
                llamarIA("Lee esta captura de Samsung Health. Dime solo: pasos totales y calorías quemadas activas (entrenamiento). Formato: pasos,calorías. Nada más.", b64, true);
            };
            reader.readAsDataURL(e.target.files[0]);
        }

        function analizarTexto() {
            const val = document.getElementById('textComida').value;
            if(val) llamarIA("Calorías de: " + val + ". Solo número.");
            document.getElementById('textComida').value = "";
        }
        
        function analizarFoto(e) {
            const reader = new FileReader();
            reader.onloadend = () => llamarIA("Calorías en imagen. Solo número.", reader.result.split(',')[1]);
            reader.readAsDataURL(e.target.files[0]);
        }
    </script>
</body>
</html>
