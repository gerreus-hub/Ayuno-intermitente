<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Ayuno Pro 24h</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#fdfaf3">

    <style>
        :root { --crema: #fdfaf3; --naranja: #ff7e5f; --texto: #4a3f35; --azul: #3b82f6; --verde: #10b981; --rojo: #ef4444; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--crema); color: var(--texto); display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; min-height: 100vh; padding-bottom: 60px; -webkit-tap-highlight-color: transparent; }
        
        .card { background: white; width: 100%; max-width: 400px; padding: 20px; border-radius: 25px; margin-top: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); box-sizing: border-box; }
        button { border: none; border-radius: 15px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        
        .reloj-container { position: relative; width: 300px; height: 300px; margin: 10px auto; display: flex; justify-content: center; align-items: center; }
        svg { transform: rotate(-90deg); width: 100%; height: 100%; }
        circle { fill: none; stroke-width: 8; stroke-linecap: round; }
        .fondo-gris { stroke: #eeebe0; }
        .progreso-color { stroke: var(--naranja); stroke-dasharray: 754; stroke-dashoffset: 754; transition: 1s linear; }
        
        .tick { stroke: #d1cdc0; stroke-width: 2; }
        .tick-heavy { stroke: var(--texto); stroke-width: 3; }
        .hora-texto { fill: #a3a092; font-size: 10px; font-weight: bold; transform: rotate(90deg); transform-origin: center; text-anchor: middle; }

        .reloj-grande { font-size: 2.8rem; font-weight: bold; position: absolute; text-align: center; line-height: 1; z-index: 10; }
        .reloj-grande small { font-size: 0.75rem; display: block; color: var(--texto); opacity: 0.5; margin-top: 5px; text-transform: uppercase; }

        #fase-status { font-weight: bold; color: var(--naranja); text-align: center; font-size: 0.85rem; margin-top: 10px; background: #fff5f2; padding: 5px 15px; border-radius: 20px; }
        .btn-main { background: linear-gradient(135deg, #ff7e5f, #feb47b); color: white; padding: 18px; width: 100%; font-size: 1.1rem; box-shadow: 0 6px 15px rgba(255, 126, 95, 0.2); margin-top: 15px; }
        .config-btn { position: absolute; top: 25px; right: 25px; background: none; font-size: 1.5rem; opacity: 0.2; }
        .stat-item { background: #fdfaf3; padding: 12px; border-radius: 15px; text-align: center; flex: 1; }
        .boost-tag { background: var(--verde); color: white; padding: 5px 12px; border-radius: 20px; font-size: 0.7rem; position: absolute; top: 45px; z-index: 20; }
        .input-time { width: 100%; padding: 10px; border: 1px solid #eee; border-radius: 10px; font-size: 0.85rem; margin-top: 5px; background: #fafafa; }
        label { font-size: 0.7rem; font-weight: bold; opacity: 0.4; display: block; margin-top: 8px; }

        .water-btn { background: #e0f2fe; color: var(--azul); width: 50px; height: 50px; font-size: 1.5rem; border-radius: 15px; display: flex; align-items: center; justify-content: center; }
        .water-grid { display: flex; align-items: center; gap: 15px; margin-top: 10px; }
    </style>
</head>
<body>

    <button class="config-btn" onclick="configurarClave()">⚙️</button>

    <div style="font-weight: bold; color: var(--azul); margin-top: 30px; font-size: 0.75rem;">
        ESTADO METABÓLICO: <span id="reloj-metabolico">00:00</span>
    </div>
    
    <div id="fase-status">Esperando inicio...</div>

    <div class="reloj-container">
        <div class="boost-tag" id="boost-display" style="display:none">🔥 ACELERADO</div>
        <svg viewBox="0 0 280 280">
            <circle class="fondo-gris" cx="140" cy="140" r="120"></circle>
            <g id="ticks-group"></g>
            <circle class="progreso-color" id="aro" cx="140" cy="140" r="120"></circle>
        </svg>
        <div class="reloj-grande">
            <span id="tiempo-real">00:00:00</span>
            <small>Tiempo de Ayuno</small>
        </div>
    </div>

    <button class="btn-main" id="btnAccion" onclick="controlarAyuno()">Iniciar Ayuno</button>

    <div class="card">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <b style="font-size: 0.85rem;">HIDRATACIÓN</b>
            <span id="total-agua" style="font-size: 0.85rem; font-weight: bold; color: var(--azul);">0.0 L</span>
        </div>
        <div class="water-grid">
            <button class="water-btn" onclick="cambiarAgua(1)">💧</button>
            <div style="flex-grow: 1;">
                <div style="font-size: 0.8rem; font-weight: bold;"><span id="contador-vasos">0</span> Vasos</div>
                <div style="font-size: 0.6rem; opacity: 0.5;">VASOS DE 250ML</div>
            </div>
            <button onclick="cambiarAgua(-1)" style="background:none; color: var(--rojo); font-size: 0.7rem; border:none; cursor:pointer;">Quitar</button>
            <button onclick="resetAgua()" style="background:none; color: var(--texto); font-size: 0.7rem; opacity: 0.3; border:none; cursor:pointer;">Reset</button>
        </div>
    </div>

    <div class="card">
        <b style="font-size: 0.8rem;">⚙️ Ajuste Manual</b>
        <div style="display: flex; gap: 10px;">
            <div style="flex: 1;">
                <label>INICIO:</label>
                <input type="datetime-local" id="manual-inicio" class="input-time" onchange="ajustarManual()">
            </div>
            <div style="flex: 1;">
                <label>FIN:</label>
                <input type="datetime-local" id="manual-fin" class="input-time" onchange="ajustarManual()">
            </div>
        </div>
    </div>

    <div class="card">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
            <b style="font-size: 0.85rem;">SAMSUNG HEALTH</b>
            <span style="font-size: 0.65rem; color: var(--azul); font-weight: bold;">ESFUERZO 🔥</span>
        </div>
        <div style="display: flex; gap: 10px;">
            <div class="stat-item"><b id="pasos-val">0</b><br><small style="font-size:0.55rem; opacity:0.5;">PASOS</small></div>
            <div class="stat-item"><b id="burn-val" style="color: var(--rojo);">0</b><br><small style="font-size:0.55rem; opacity:0.5;">KCAL 🔥</small></div>
        </div>
        <button onclick="document.getElementById('inputSync').click()" style="background: #f0f7ff; color: var(--azul); padding: 12px; margin-top:10px; width:100%; font-size: 0.8rem; border-radius: 12px;">🔄 Sincronizar Captura</button>
        <input type="file" id="inputSync" accept="image/*" style="display:none" onchange="sincronizarActividad(event)">
    </div>

    <script>
        let MI_LLAVE = localStorage.getItem('gemini_key') || "";
        let inicio = parseInt(localStorage.getItem('fast_start')) || null;
        let kcalEntreno = parseInt(localStorage.getItem('fast_kcal')) || 0;
        let activo = localStorage.getItem('fast_active') === 'true';
        let fin = parseInt(localStorage.getItem('fast_end')) || null;
        let vasosAgua = parseInt(localStorage.getItem('fast_water')) || 0;
        let cronometro;

        const fases = [
            { h: 0, nombre: "Anabólica", desc: "Procesando nutrientes" },
            { h: 4, nombre: "Catabólica", desc: "Usando glucógeno" },
            { h: 12, nombre: "Quema de Grasa", desc: "Lipólisis activa" },
            { h: 16, nombre: "Autofagia", desc: "Limpieza celular ✨" },
            { h: 22, nombre: "Cetosis", desc: "Máxima quema 🔥" }
        ];

        window.onload = () => {
            dibujarReloj();
            actualizarUI_Agua();
            if(activo && inicio) {
                document.getElementById('btnAccion').innerText = "Terminar Ayuno";
                document.getElementById('btnAccion').style.background = "var(--rojo)";
                cronometro = setInterval(updateReloj, 1000);
            }
            updateReloj();
        };

        function controlarAyuno() {
            if(!activo) {
                // RESET TOTAL AL INICIAR
                inicio = Date.now(); 
                fin = null; 
                activo = true;
                kcalEntreno = 0; // Reset de calorías para que el estado metabólico empiece en 0
                
                localStorage.setItem('fast_start', inicio);
                localStorage.setItem('fast_active', 'true');
                localStorage.setItem('fast_kcal', 0);
                localStorage.removeItem('fast_end');
                
                // Reset visual de los stats de Samsung Health
                document.getElementById('pasos-val').innerText = "0";
                document.getElementById('burn-val').innerText = "0";

                document.getElementById('btnAccion').innerText = "Terminar Ayuno";
                document.getElementById('btnAccion').style.background = "var(--rojo)";
                cronometro = setInterval(updateReloj, 1000);
            } else {
                fin = Date.now(); activo = false;
                localStorage.setItem('fast_end', fin);
                localStorage.setItem('fast_active', 'false');
                clearInterval(cronometro);
                document.getElementById('btnAccion').innerText = "Iniciar Ayuno";
                document.getElementById('btnAccion').style.background = "linear-gradient(135deg, #ff7e5f, #feb47b)";
            }
            updateReloj();
        }

        function updateReloj() {
            if(!inicio) return;
            let ahora = activo ? Date.now() : fin;
            const segsR = Math.floor((ahora - inicio) / 1000);
            
            // segsE es el tiempo metabólico (tiempo real + bonus de ejercicio)
            const boostS = Math.floor((kcalEntreno / 200) * 1800);
            const segsE = Math.max(0, segsR + boostS);

            // 1. Cronómetro digital (Tiempo Real)
            document.getElementById('tiempo-real').innerText = formatTime(segsR, true);
            
            // 2. Reloj Metabólico superior (Empieza en 0 si kcalEntreno es 0)
            document.getElementById('reloj-metabolico').innerText = formatTime(segsE, false);

            // 3. Fase Metabólica (Basada en el tiempo efectivo)
            const horasE = segsE / 3600;
            let fase = fases[0];
            fases.forEach(f => { if(horasE >= f.h) fase = f; });
            document.getElementById('fase-status').innerText = `${fase.nombre}: ${fase.desc}`;

            // 4. LA RUEDA (Sincronizada con el cronómetro real para que empiece en 0)
            const circuloFull = 754; 
            // Usamos segsR para que el aro empiece vacío y se llene a la par que el tiempo real
            const offset = circuloFull - (circuloFull * Math.min(segsR / 86400, 1));
            document.getElementById('aro').style.strokeDashoffset = offset;
        }

        function formatTime(s, showS) {
            const h = Math.floor(s / 3600).toString().padStart(2, '0');
            const m = Math.floor((s % 3600) / 60).toString().padStart(2, '0');
            const sec = (s % 60).toString().padStart(2, '0');
            return showS ? `${h}:${m}:${sec}` : `${h}:${m}`;
        }

        function dibujarReloj() {
            const grupo = document.getElementById('ticks-group');
            for (let i = 0; i < 24; i++) {
                const angulo = (i * 360 / 24);
                const esPrincipal = i % 6 === 0;
                const tick = document.createElementNS("http://www.w3.org/2000/svg", "line");
                tick.setAttribute("x1", 140); tick.setAttribute("y1", 20); tick.setAttribute("x2", 140);
                tick.setAttribute("y2", esPrincipal ? 32 : 28);
                tick.setAttribute("class", esPrincipal ? "tick-heavy" : "tick");
                tick.setAttribute("transform", `rotate(${angulo} 140 140)`);
                grupo.appendChild(tick);
            }
        }

        function cambiarAgua(n) {
            vasosAgua = Math.max(0, vasosAgua + n);
            localStorage.setItem('fast_water', vasosAgua);
            actualizarUI_Agua();
        }

        function resetAgua() {
            vasosAgua = 0;
            localStorage.setItem('fast_water', 0);
            actualizarUI_Agua();
        }

        function actualizarUI_Agua() {
            document.getElementById('contador-vasos').innerText = vasosAgua;
            document.getElementById('total-agua').innerText = (vasosAgua * 0.25).toFixed(1) + " L";
        }
        
        function configurarClave() {
            const key = prompt("Pega tu clave Gemini:", MI_LLAVE);
            if (key) { localStorage.setItem('gemini_key', key.trim()); MI_LLAVE = key.trim(); alert("Listo."); }
        }
    </script>
</body>
</html>
